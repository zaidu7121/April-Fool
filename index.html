<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Video</title>

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: Arial, sans-serif;
  text-align: center;
}

#loader {
  position: absolute;
  top: 40%;
  width: 100%;
}

.spinner {
  border: 5px solid #333;
  border-top: 5px solid #fff;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  margin: auto;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

#typing {
  margin-top: 20px;
  font-size: 20px;
}

#main {
  display: none;
  padding: 20px;
}

img {
  width: 90%;
  max-width: 300px;
  border-radius: 15px;
  margin: 10px;
  transition: 0.5s;
}

.fade {
  opacity: 0;
}

.show {
  opacity: 1;
}

h2 {
  color: #ff4d6d;
}
</style>
</head>

<body>

<div id="loader">
  <div class="spinner"></div>
  <div id="typing"></div>
</div>

<div id="main">
  <h2 id="finalText"></h2>
  <img id="slide" src="">
  <h3>Happy April Fool ❤️😝</h3>
</div>

<script>
const messages = [
  "Ek ladki hai...",
  "Bahut acchi hai...",
  "Bahut cute hai...",
  "Aur mujhe bahut pasand hai ❤️"
];

let i = 0;
let j = 0;

function typeEffect() {
  if (i < messages.length) {
    if (j < messages[i].length) {
      document.getElementById("typing").innerHTML += messages[i].charAt(j);
      j++;
      setTimeout(typeEffect, 50);
    } else {
      document.getElementById("typing").innerHTML += "<br>";
      i++;
      j = 0;
      setTimeout(typeEffect, 800);
    }
  } else {
    setTimeout(showMain, 1000);
  }
}

function showMain() {
  document.getElementById("loader").style.display = "none";
  document.getElementById("main").style.display = "block";
  document.getElementById("finalText").innerText = "😂 Got You! Wo ladki tum hi ho ❤️";

  startSlideshow();
}

const images = [
  "PHOTO1",
  "PHOTO2",
  "PHOTO3"
];

let index = 0;

function startSlideshow() {
  const img = document.getElementById("slide");
  img.src = images[index];
  img.classList.add("show");

  setInterval(() => {
    img.classList.remove("show");
    setTimeout(() => {
      index = (index + 1) % images.length;
      img.src = images[index];
      img.classList.add("show");
    }, 300);
  }, 2000);
}

typeEffect();
</script>

</body>
</html>
